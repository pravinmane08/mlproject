<!DOCTYPE html>
<html>
<head>
<title>Predict</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f5f7fa;
}
.card {
    border-radius: 15px;
    box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">🎓 Student ML App</a>
    <a class="btn btn-light" href="/dashboard">Dashboard</a>
  </div>
</nav>

<div class="container mt-5">

<div class="card p-4">
<h3 class="text-center mb-4">📊 Student Performance Prediction</h3>

<form method="POST">

<!-- ROW 1 -->
<div class="row mb-3">
  <div class="col-md-6">
    <label class="form-label">Gender</label>
    <select name="gender" class="form-control" required>
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>
  </div>

  <div class="col-md-6">
    <label class="form-label">Race / Ethnicity</label>
    <select name="ethnicity" class="form-control" required>
      <option value="group A">Group A</option>
      <option value="group B">Group B</option>
      <option value="group C">Group C</option>
      <option value="group D">Group D</option>
      <option value="group E">Group E</option>
    </select>
  </div>
</div>

<!-- ROW 2 -->
<div class="row mb-3">
  <div class="col-md-6">
    <label class="form-label">Parental Education</label>
    <select name="parental_level_of_education" class="form-control" required>
      <option value="bachelor's degree">Bachelor's Degree</option>
      <option value="some college">Some College</option>
      <option value="master's degree">Master's Degree</option>
      <option value="associate's degree">Associate's Degree</option>
      <option value="high school">High School</option>
    </select>
  </div>

  <div class="col-md-6">
    <label class="form-label">Lunch Type</label>
    <select name="lunch" class="form-control" required>
      <option value="standard">Standard</option>
      <option value="free/reduced">Free / Reduced</option>
    </select>
  </div>
</div>

<!-- ROW 3 -->
<div class="row mb-3">
  <div class="col-md-6">
    <label class="form-label">Test Preparation Course</label>
    <select name="test_preparation_course" class="form-control" required>
      <option value="none">None</option>
      <option value="completed">Completed</option>
    </select>
  </div>

  <div class="col-md-3">
    <label class="form-label">Reading Score</label>
    <input type="number" name="reading_score" class="form-control" min="0" max="100" required>
  </div>

  <div class="col-md-3">
    <label class="form-label">Writing Score</label>
    <input type="number" name="writing_score" class="form-control" min="0" max="100" required>
  </div>
</div>

<!-- BUTTON -->
<button class="btn btn-primary w-100">🚀 Predict</button>

</form>

<!-- RESULT -->
{% if result %}
<div class="alert alert-success mt-4 text-center">
  <h4>📊 Predicted Math Score: {{ result }}</h4>
  <p class="fw-bold">{{ message }}</p>
</div>
{% endif %}

<!-- ERROR -->
{% if error %}
<div class="alert alert-danger mt-4 text-center">
  ⚠️ {{ error }}
</div>
{% endif %}

</div>

</div>

</body>
</html>
